<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">OP</div>
      <h1 class="login-title">Portfolio Admin</h1>
      <p class="login-sub">Sign in to manage your portfolio content</p>
      <form id="loginForm">
        <div class="field">
          <label>Username</label>
          <input type="text" id="loginUser" value="admin" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="••••••••" required />
        </div>
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="btn btn--primary btn--full">Sign In</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard hidden" id="dashboard">
    <aside class="sidebar">
      <div class="sidebar__logo">OP Admin</div>
      <nav class="sidebar__nav">
        <a href="#" class="nav-item active" data-section="hero">🏠 Hero</a>
        <a href="#" class="nav-item" data-section="about">👤 About</a>
        <a href="#" class="nav-item" data-section="achievements">📈 Achievements</a>
        <a href="#" class="nav-item" data-section="caseStudies">📋 Case Studies</a>
        <a href="#" class="nav-item" data-section="skills">🛠️ Skills</a>
        <a href="#" class="nav-item" data-section="experience">💼 Experience</a>
        <a href="#" class="nav-item" data-section="contact">✉️ Contact</a>
      </nav>
      <div class="sidebar__actions">
        <button class="btn btn--publish" id="publishBtn">🚀 Publish to Live</button>
        <button class="btn btn--reset" id="resetBtn">↩️ Reset Draft</button>
        <a href="/" target="_blank" class="btn btn--ghost">👁 View Live Site</a>
        <button class="btn btn--ghost" id="logoutBtn">Sign Out</button>
      </div>
    </aside>

    <main class="main">
      <div class="main__topbar">
        <div>
          <h2 class="main__title" id="sectionTitle">Hero</h2>
          <span class="draft-badge">✏️ Editing Draft</span>
        </div>
        <button class="btn btn--save" id="saveBtn">Save Changes</button>
      </div>
      <div class="main__content" id="editorArea">
        <!-- dynamically rendered -->
      </div>
    </main>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <h3 class="modal__title" id="modalTitle">Are you sure?</h3>
      <p class="modal__body" id="modalBody"></p>
      <div class="modal__actions">
        <button class="btn btn--ghost" id="modalCancel">Cancel</button>
        <button class="btn btn--danger" id="modalConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast hidden" id="toast"></div>

  <script src="admin.js"></script>
</body>
</html>
